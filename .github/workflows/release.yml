name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create zip
        run: zip -r Ape42-Taxispeed-${{ github.ref_name }}.zip Ape42-Taxispeed/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Ape42-Taxispeed-${{ github.ref_name }}.zip
